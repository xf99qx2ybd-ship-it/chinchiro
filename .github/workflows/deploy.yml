name: Deploy to GitHub Pages

# main ブランチに変更が入るたびに、自動でビルドして公開する
on:
  push:
    branches: [main]
  workflow_dispatch: # 手動でも実行できるようにする

permissions:
  contents: read
  pages: write
  id-token: write

# 公開処理が重ならないようにする
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4
      - name: Node.js を準備
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: ライブラリをインストール
        run: npm ci
      - name: ビルド
        run: npm run build
      - name: 公開用ファイルをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へ公開
        id: deployment
        uses: actions/deploy-pages@v4
