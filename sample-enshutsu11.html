<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>チンチロ 激アツ（炎＋衝撃スラム）サンプル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#fff;font-family:sans-serif;padding:16px;max-width:460px;margin:0 auto}
h2{color:#f5c842;font-size:18px;margin-bottom:4px}
.intro{color:#999;font-size:12px;line-height:1.7;margin-bottom:16px}
.intro b{color:#ddd}
.card{background:#1b1b1b;border:1.5px solid #333;border-radius:16px;padding:14px;margin-bottom:18px}
.desc{font-size:11px;color:#888;margin-bottom:6px;line-height:1.6}

.stage{position:relative;width:220px;height:220px;margin:8px auto 2px}
.bowl{position:absolute;inset:0;overflow:visible}
.bowl-bg{position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(ellipse at 38% 30%,
    #f8f8f6 0%,#eeece4 14%,#e0ddd5 28%,#cdc9c0 42%,
    #b5b0a7 56%,#9e9990 68%,#8a857c 79%,#76716a 88%,#636059 100%);
  box-shadow:inset 0 8px 22px rgba(0,0,0,.5),inset 0 -4px 10px rgba(255,255,255,.1),0 5px 28px rgba(0,0,0,.7);z-index:1}
canvas.fx{position:absolute;inset:0;pointer-events:none}
.warm{position:absolute;inset:0;border-radius:50%;pointer-events:none;
  background:radial-gradient(ellipse at 50% 60%,rgba(255,150,40,.85) 0%,rgba(255,90,20,.45) 34%,rgba(180,40,10,.12) 56%,transparent 72%);
  mix-blend-mode:soft-light;opacity:0;z-index:5}

.diegroup{position:absolute;inset:0;z-index:4}
.die-outer{position:absolute;transform:translate(-50%,-50%)}
.die-outer.top{left:50%;top:44%}
.die-outer.bl {left:42%;top:57%}
.die-outer.br {left:58%;top:57%}
.die-fly{transform-origin:50% 50%}
.die-scale{transform-origin:50% 50%}
.cs{width:46px;height:46px;perspective:300px;perspective-origin:50% -30%}
.cube{width:46px;height:46px;position:relative;transform-style:preserve-3d;transform:rotateX(-18deg) rotateY(16deg)}
.face{position:absolute;width:46px;height:46px;border-radius:9px;border:1px solid rgba(180,165,145,.25);backface-visibility:hidden;overflow:hidden}
.f-top{transform:rotateX( 90deg) translateZ(23px);background:linear-gradient(145deg,#fffdf7,#f5f0e5)}
.f-bot{transform:rotateX(-90deg) translateZ(23px);background:linear-gradient(145deg,#d5d0c5,#c8c3b8)}
.f-frt{transform:             translateZ(23px);background:linear-gradient(145deg,#faf7f0,#f0ece2)}
.f-bak{transform:rotateY(180deg) translateZ(23px);background:linear-gradient(145deg,#e6e3db,#dad6ce)}
.f-rgt{transform:rotateY( 90deg) translateZ(23px);background:linear-gradient(145deg,#f0ede5,#e4e0d8)}
.f-lft{transform:rotateY(-90deg) translateZ(23px);background:linear-gradient(145deg,#e8e5dd,#dcd8d0)}
.dot{position:absolute;width:18%;height:18%;border-radius:50%;background:radial-gradient(circle at 35% 30%,#333,#000)}
.r{background:radial-gradient(circle at 35% 30%,#ff3333,#cc0000)!important}
.p1 .dot:nth-child(1){top:41%;left:41%}
.p2 .dot:nth-child(1){top:15%;left:15%} .p2 .dot:nth-child(2){bottom:15%;right:15%}
.p3 .dot:nth-child(1){top:13%;left:13%} .p3 .dot:nth-child(2){top:41%;left:41%} .p3 .dot:nth-child(3){bottom:13%;right:13%}
.p4 .dot:nth-child(1){top:15%;left:15%} .p4 .dot:nth-child(2){top:15%;right:15%} .p4 .dot:nth-child(3){bottom:15%;left:15%} .p4 .dot:nth-child(4){bottom:15%;right:15%}
.p5 .dot:nth-child(1){top:13%;left:13%} .p5 .dot:nth-child(2){top:13%;right:13%} .p5 .dot:nth-child(3){top:41%;left:41%} .p5 .dot:nth-child(4){bottom:13%;left:13%} .p5 .dot:nth-child(5){bottom:13%;right:13%}
.p6 .dot:nth-child(1){top:13%;left:15%} .p6 .dot:nth-child(2){top:13%;right:15%} .p6 .dot:nth-child(3){top:41%;left:15%} .p6 .dot:nth-child(4){top:41%;right:15%} .p6 .dot:nth-child(5){bottom:13%;left:15%} .p6 .dot:nth-child(6){bottom:13%;right:15%}

/* ── 落下アニメ（アプリと同じ動き） ── */
@keyframes sp3{0%{transform:rotateX(0) rotateY(0) rotateZ(0)}100%{transform:rotateX(1422deg) rotateY(1096deg)}}
@keyframes posTopW{0%{left:50%;top:15%}100%{left:50%;top:44%}}
@keyframes posBlW {0%{left:20%;top:80%}100%{left:42%;top:57%}}
@keyframes posBrW {0%{left:80%;top:80%}100%{left:58%;top:57%}}
@keyframes dsz1{0%{transform:scale(2.40)}82%{transform:scale(0.50)}91%{transform:scale(0.60)}100%{transform:scale(0.56)}}
@keyframes dropN{0%{transform:translateY(-34px);opacity:0}7%{opacity:1}82%{transform:translateY(7px)}91%{transform:translateY(-4px)}100%{transform:translateY(0)}}
.play .diegroup{animation:dropN 1.25s cubic-bezier(.3,.1,.3,1) both}
.play .die-outer.top{animation:posTopW 1.25s cubic-bezier(.3,.1,.3,1) both}
.play .die-outer.bl{animation:posBlW 1.25s cubic-bezier(.3,.1,.3,1) both}
.play .die-outer.br{animation:posBrW 1.25s cubic-bezier(.3,.1,.3,1) both}
.play .die-scale{animation:dsz1 1.25s cubic-bezier(.3,.1,.3,1) both}
.play .cube{animation:sp3 1.25s cubic-bezier(.3,.1,.3,1) both}

/* ── カットイン（衝撃スラム） ── */
.cutin{position:absolute;inset:0;z-index:10;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0}
.cutin.show{opacity:1}
.cutin.out{opacity:0;transition:opacity .22s ease}
.fly{position:relative;display:flex;align-items:center;justify-content:center}
.ci-text{font-size:30px;font-weight:900;letter-spacing:.05em;white-space:nowrap;line-height:1;
  background:linear-gradient(168deg,#fff8e6 0%,#ffe49e 26%,#f3c155 50%,#fff0bf 68%,#e3a93f 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.7)) drop-shadow(0 2px 7px rgba(0,0,0,.45)) drop-shadow(0 0 10px rgba(255,196,84,.65));}
.ci-glow{position:absolute;left:50%;top:50%;width:215px;height:86px;transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at center,rgba(8,5,0,.52) 0%,rgba(8,5,0,.22) 46%,transparent 72%);filter:blur(2px);opacity:0}
.cutin.show .ci-glow{animation:glowIn .2s ease both}
@keyframes glowIn{from{opacity:0}to{opacity:1}}

@keyframes shakeKf{0%{transform:translate(0,0)}20%{transform:translate(3px,-2px)}40%{transform:translate(-3px,2px)}60%{transform:translate(2px,2px)}80%{transform:translate(-2px,-1px)}100%{transform:translate(0,0)}}
#bowl.kick{animation:shakeKf .13s linear}

.shock{position:absolute;left:50%;top:50%;width:74px;height:74px;border:3px solid rgba(255,214,128,.95);border-radius:50%;
  transform:translate(-50%,-50%) scale(.3);opacity:0;box-shadow:0 0 16px rgba(255,190,90,.7)}
.flash{position:absolute;left:50%;top:50%;width:240px;height:130px;transform:translate(-50%,-50%);
  background:radial-gradient(ellipse,rgba(255,246,222,.95) 0%,rgba(255,210,140,.4) 40%,transparent 68%);opacity:0}
.streak{position:absolute;height:3px;border-radius:3px;opacity:0;
  background:linear-gradient(90deg,transparent,#fff,transparent);box-shadow:0 0 8px #ffd98a}
.streak.s1{left:0;top:42%;width:70%}
.streak.s2{right:0;top:58%;width:62%}
.streak.s3{left:6%;top:50%;width:46%}
.cutin.show .fly{animation:slam .44s cubic-bezier(.12,.72,.2,1) both}
.cutin.show .shock{animation:shock .52s ease-out .2s both}
.cutin.show .flash{animation:flash .34s ease-out .18s both}
.cutin.show .streak{animation:streak .3s ease-out both}
.cutin.show .streak.s2{animation-delay:.04s}
.cutin.show .streak.s3{animation-delay:.02s}
@keyframes slam{0%{opacity:0;transform:translateX(165px) scale(1.28)}50%{opacity:1;transform:translateX(-14px) scale(1.06)}
  68%{transform:translateX(7px) scale(.97)}82%{transform:translateX(-3px) scale(1.01)}92%{transform:translateX(2px)}100%{transform:translateX(0) scale(1)}}
@keyframes shock{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}22%{opacity:.85}100%{opacity:0;transform:translate(-50%,-50%) scale(1.7)}}
@keyframes flash{0%{opacity:0}26%{opacity:.9}100%{opacity:0}}
@keyframes streak{0%{opacity:0;transform:translateX(40px)}30%{opacity:1}100%{opacity:0;transform:translateX(-30px)}}

.result{text-align:center;font-size:30px;font-weight:900;color:#f5c842;margin-top:6px;min-height:38px;letter-spacing:.06em;opacity:0;transition:opacity .3s}
.result.show{opacity:1}
.row{display:flex;gap:8px;justify-content:center;margin-top:6px;flex-wrap:wrap}
.btn{background:#2a2a2a;color:#ccc;border:1px solid #444;border-radius:9px;padding:8px 24px;font-size:14px;cursor:pointer;font-weight:700}
.btn:hover{background:#383838;color:#fff}
.btn.main{background:#7a2d0a;border-color:#a8521f;color:#ffd9b8}
.btn.main:hover{background:#94380d}
.flow{margin-top:12px;background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;font-size:11.5px;color:#aaa;line-height:1.85}
.flow .h{color:#ddd;font-weight:700;display:block;margin-bottom:2px}
.flow b{color:#f5c842;font-weight:700}
</style>
</head>
<body>

<h2>🔥⚡ 激アツ（炎＋衝撃スラム）サンプル</h2>
<p class="intro">いちばん盛り上がる<b>「激アツ」</b>パターン＝<b>炎🔥と衝撃スラム⚡が同時に出る</b>演出です。<br>サイコロが燃えながら落ちてくる最中に、カットインがドンッと飛び込んできます。<br>「▶ 振る（激アツ）」で確認できます。</p>

<div class="card">
  <div class="desc">振る → 燃えながら落下 → カットインがドンッと着弾 → 文字が消える → 炎も消えて役確定</div>
  <div class="stage">
    <div class="bowl" id="bowl">
      <div class="bowl-bg"></div>
      <canvas class="fx" id="cBack" width="220" height="220" style="z-index:2"></canvas>
      <div class="diegroup">
        <div class="die-outer top"><div class="die-fly"><div class="die-scale"><div class="cs"><div class="cube">
          <div class="face f-top"><div class="p3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-bot"><div class="p4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-frt"><div class="p2"><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-bak"><div class="p5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-rgt"><div class="p4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-lft"><div class="p3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
        </div></div></div></div></div>
        <div class="die-outer bl"><div class="die-fly"><div class="die-scale"><div class="cs"><div class="cube">
          <div class="face f-top"><div class="p5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-bot"><div class="p2"><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-frt"><div class="p3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-bak"><div class="p4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-rgt"><div class="p2"><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-lft"><div class="p5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
        </div></div></div></div></div>
        <div class="die-outer br"><div class="die-fly"><div class="die-scale"><div class="cs"><div class="cube">
          <div class="face f-top"><div class="p1"><div class="dot r"></div></div></div>
          <div class="face f-bot"><div class="p6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-frt"><div class="p4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-bak"><div class="p3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-rgt"><div class="p3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          <div class="face f-lft"><div class="p4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
        </div></div></div></div></div>
      </div>
      <div class="warm" id="warm"></div>
      <canvas class="fx" id="cFront" width="220" height="220" style="z-index:6;filter:url(#heat)"></canvas>
      <div class="cutin" id="cutin">
        <div class="ci-glow"></div><div class="flash"></div><div class="shock"></div>
        <span class="streak s1"></span><span class="streak s2"></span><span class="streak s3"></span>
        <div class="fly"><div class="ci-text">運命の一投</div></div>
      </div>
    </div>
  </div>
  <div class="result" id="result">シゴロ</div>
  <div class="row">
    <button class="btn main" onclick="roll()">▶ 振る（激アツ）</button>
  </div>
  <div class="flow">
    <span class="h">流れ（激アツ＝炎＋カットイン同時）</span>
    燃えながら落下 → <b>カットインがドンッと着弾</b>（衝撃波・シェイク）→ 文字がスッと消える → 炎も消えて<b>役確定</b>
  </div>
</div>

<svg width="0" height="0" style="position:absolute">
  <filter id="heat" x="-25%" y="-25%" width="150%" height="150%">
    <feTurbulence type="fractalNoise" baseFrequency="0.01 0.024" numOctaves="2" seed="5" result="n">
      <animate attributeName="seed" values="5;14;5" dur="1.6s" repeatCount="indefinite"/></feTurbulence>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="10" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>

<script>
function sprite(r,g,b){
  const c=document.createElement('canvas');c.width=c.height=64;
  const x=c.getContext('2d');
  const gd=x.createRadialGradient(32,32,0,32,32,32);
  gd.addColorStop(0,'rgba('+r+','+g+','+b+',1)');
  gd.addColorStop(.45,'rgba('+r+','+g+','+b+',.45)');
  gd.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
  x.fillStyle=gd;x.fillRect(0,0,64,64);return c;
}
const CORE=sprite(255,249,210),YEL=sprite(255,236,150),AMB=sprite(255,178,72),ORA=sprite(255,120,40),RED=sprite(212,52,18),EMB=sprite(255,232,170);
const SPK=[{s:sprite(255,255,248)},{s:sprite(255,236,150)},{s:sprite(255,170,78)}];
function spkCol(){const r=Math.random();return r<.3?SPK[0]:r<.74?SPK[1]:SPK[2];}

let raf=0,t0=0,time=0,flick=1;

// 炎サイズ ×1.35（一回り大きい）で確定
const SRC=[
  {cx:110,baseY:112,baseW:28.2,height:108,  size:18.9,swayAmt:11,drift:0.7,wander:1.55,spawn:6.54,front:2.03,spark:3.51,
   swayInt:0.16,breathInt:0.20,phase:0.0, sway:0,swayT:0,swayNext:0,breath:1,breathT:1,breathNext:0},
  {cx:92, baseY:142,baseW:28.2,height:113.4,size:18.9,swayAmt:15,drift:0.85,wander:1.8,spawn:7.82,front:2.97,spark:3.51,
   swayInt:0.23,breathInt:0.27,phase:1.7, sway:0,swayT:0,swayNext:0,breath:1,breathT:1,breathNext:0},
  {cx:128,baseY:142,baseW:28.2,height:124.2,size:18.9,swayAmt:13,drift:0.6,wander:1.7,spawn:8.53,front:2.97,spark:4.05,
   swayInt:0.19,breathInt:0.31,phase:3.1, sway:0,swayT:0,swayNext:0,breath:1,breathT:1,breathNext:0},
];

const F=(function(){
  const back =document.getElementById('cBack').getContext('2d');
  const front=document.getElementById('cFront').getContext('2d');
  const warmEl=document.getElementById('warm');
  let fire=[],fireF=[],emb=[],spk=[],spkB=[];
  let burn=false,inten=0,offT=0;

  function mkFire(si,isFront){
    const S=SRC[si];
    const baseX=S.cx+S.sway*S.swayAmt;
    const x=baseX+(Math.random()-.5)*S.baseW;
    const y=S.baseY+Math.random()*8;
    const tall=Math.random()<0.22?1.5:1;
    const vy=-(0.65+Math.random()*1.0)*(0.75+S.breath*0.8)*tall;
    return {si,x,y,vx:(Math.random()-.5)*.4,vy,life:1,
      decay:0.016*(0.7+Math.random()*0.7),size:S.size*(0.7+Math.random()*0.8),
      ph:Math.random()*6.28,amp:S.wander*(0.5+Math.random()),
      baseY:S.baseY,height:S.height,front:isFront,split:false};
  }
  function drawFire(p,ctx){
    const S=SRC[p.si];
    p.ph+=0.09;
    const hf=Math.max(0,Math.min(1,(p.baseY-p.y)/p.height));
    const wob=Math.sin(p.ph+S.sway*2)*p.amp*(0.4+hf*1.6);
    p.x+=p.vx+wob*0.12+S.sway*S.drift;
    p.vy-=0.0065*(0.8+S.breath*0.6);
    p.y+=p.vy;
    if(hf>0.5){
      p.vx+=(Math.random()-.5)*0.7*hf;
      p.life-=p.decay*(1+hf*1.6);
      if(!p.split&&p.life<0.5&&Math.random()<0.05){p.split=true;
        for(let k=0;k<2;k++)fire.push({si:p.si,x:p.x,y:p.y,vx:(Math.random()-.5)*1.3,vy:p.vy*0.8,
          life:p.life*0.8,decay:p.decay*1.7,size:p.size*0.65,ph:Math.random()*6.28,amp:p.amp,
          baseY:p.baseY,height:p.height,front:p.front,split:true});}
    }else p.life-=p.decay;
    if(p.life<=0)return false;
    const l=p.life;let spr,a;
    if(l>0.82){spr=CORE;a=0.10;}else if(l>0.6){spr=YEL;a=0.13;}
    else if(l>0.4){spr=AMB;a=0.14;}else if(l>0.22){spr=ORA;a=0.13;}else{spr=RED;a=0.10;}
    a*=(p.front?0.62:1)*0.85;
    const env=Math.sin(Math.min(1,l)*Math.PI);
    ctx.globalAlpha=a*env*inten;
    const s=p.size*(0.7+(1-l)*1.0);
    ctx.drawImage(spr,p.x-s/2,p.y-s/2,s,s);
    return true;
  }
  function mkEmb(si){const S=SRC[si];
    const x=S.cx+S.sway*S.swayAmt+(Math.random()-.5)*S.baseW,y=S.baseY-Math.random()*30;
    return {x,y,vx:(Math.random()-.5)*1.0+S.sway*0.4,vy:-(0.9+Math.random()*1.8),
      life:1,decay:0.012+Math.random()*0.02,size:1.2+Math.random()*2.2,ph:Math.random()*6.28};}
  function drawEmb(p,ctx){
    p.ph+=0.2; p.x+=p.vx+Math.sin(p.ph)*0.3; p.vy+=0.008; p.y+=p.vy; p.life-=p.decay;
    if(p.life<=0)return false;
    ctx.globalAlpha=Math.min(1,p.life*1.3)*(0.7+0.3*Math.sin(p.ph*2))*inten;
    const s=p.size*1.6*1.35; ctx.drawImage(EMB,p.x-s/2,p.y-s/2,s,s); return true;}
  function mkSpark(si){const S=SRC[si];
    const x=S.cx+S.sway*S.swayAmt+(Math.random()-.5)*S.baseW,y=S.baseY-Math.random()*40;
    const ang=-Math.PI/2+(Math.random()-.5)*2.6,sp=0.8+Math.random()*3.4,col=spkCol();
    return {x,y,vx:Math.cos(ang)*sp+S.sway*0.4,vy:Math.sin(ang)*sp,g:0.02+Math.random()*0.05,
      life:1,decay:0.012+Math.random()*0.04,size:0.7+Math.random()*2.8,bright:0.45+Math.random()*0.55,
      tw:Math.random()*6.28,s:col.s};}
  function drawSpark(p,ctx){
    p.tw+=0.7; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.life-=p.decay;
    if(p.life<=0)return false;
    const tw=0.6+0.4*Math.sin(p.tw*1.7+p.x);
    ctx.globalAlpha=Math.min(1,p.life*1.3)*p.bright*tw;
    const s=p.size*1.5*1.35; ctx.drawImage(p.s,p.x-s/2,p.y-s/2,s,s); return true;}

  function step(){
    inten+=((burn?1:0)-inten)*0.06;
    for(const S of SRC){
      if(time>S.swayNext){S.swayT=(Math.random()-.5)*2;S.swayNext=time+S.swayInt+Math.random()*0.4;}
      S.sway+=(S.swayT-S.sway)*0.07;
      if(time>S.breathNext){S.breathT=0.5+Math.random()*1.0;S.breathNext=time+S.breathInt+Math.random()*0.5;}
      if(Math.random()<0.015)S.breathT=1.5+Math.random()*0.3;
      S.breath+=(S.breathT-S.breath)*0.08;
    }
    if(inten>0.02){
      for(let si=0;si<3;si++){const S=SRC[si];
        const fl=0.5+0.5*Math.sin(time*13+S.phase*3);
        const nb=Math.round(S.spawn*(0.6+fl*0.8)*inten*S.breath);
        for(let i=0;i<nb;i++)fire.push(mkFire(si,false));
        const nfr=Math.round(S.front*(0.5+fl*0.8)*inten);
        for(let i=0;i<nfr;i++)fireF.push(mkFire(si,true));
        if(Math.random()<0.55*inten)emb.push(mkEmb(si));
        const nsp=Math.round(S.spark*(0.5+fl)*inten);
        for(let i=0;i<nsp;i++)(Math.random()<0.4?spkB:spk).push(mkSpark(si));
      }
    }
    back.clearRect(0,0,220,220); back.globalCompositeOperation='lighter';
    for(let i=fire.length-1;i>=0;i--){if(!drawFire(fire[i],back))fire.splice(i,1);}
    for(let i=spkB.length-1;i>=0;i--){if(!drawSpark(spkB[i],back))spkB.splice(i,1);}
    front.clearRect(0,0,220,220); front.globalCompositeOperation='lighter';
    for(let i=fireF.length-1;i>=0;i--){if(!drawFire(fireF[i],front))fireF.splice(i,1);}
    for(let i=emb.length-1;i>=0;i--){if(!drawEmb(emb[i],front))emb.splice(i,1);}
    for(let i=spk.length-1;i>=0;i--){if(!drawSpark(spk[i],front))spk.splice(i,1);}
    warmEl.style.opacity=((0.30+0.5*flick)*inten*1.25).toFixed(3);
    if(!burn&&inten<0.02&&fire.length+fireF.length+spk.length+spkB.length+emb.length===0){
      back.clearRect(0,0,220,220);front.clearRect(0,0,220,220);warmEl.style.opacity=0;
      cancelAnimationFrame(raf);raf=0;
    }
  }
  function ignite(dur){burn=true;clearTimeout(offT);offT=setTimeout(()=>{burn=false;},dur);start();}
  function reset(){burn=false;clearTimeout(offT);inten=0;fire=[];fireF=[];emb=[];spk=[];spkB=[];
    back.clearRect(0,0,220,220);front.clearRect(0,0,220,220);warmEl.style.opacity=0;}
  function start(){if(!raf){t0=0;raf=requestAnimationFrame(loop);}}
  return {step,ignite,reset};
})();

const DIE_EL=[document.querySelector('.die-outer.top .cube'),
              document.querySelector('.die-outer.bl  .cube'),
              document.querySelector('.die-outer.br  .cube')];
const BOWL_EL=document.getElementById('bowl');
const FIRE_DROP=42;
function updateSources(){
  const b=BOWL_EL.getBoundingClientRect();
  const sx=220/b.width, sy=220/b.height;
  for(let i=0;i<3;i++){
    const r=DIE_EL[i].getBoundingClientRect();
    SRC[i].cx   =(r.left+r.width /2 - b.left)*sx;
    SRC[i].baseY=(r.top +r.height/2 - b.top )*sy + FIRE_DROP;
  }
}

function loop(ts){
  if(!t0)t0=ts; time=(ts-t0)/1000;
  flick=0.5+0.5*(0.5*Math.sin(time*13)+0.3*Math.sin(time*27+1)+0.2*Math.sin(time*41+2));
  updateSources();
  F.step();
  raf=requestAnimationFrame(loop);
}

/* ── カットイン（衝撃スラム） ── */
const MSGS=["アツい！","ここで…！","来るか…？","勝負！","震えろ…！","魅せろ！",
            "一発っ！","運命の一投","イチかバチか","気合いだッ","いけ…！","魅せ場だ"];
let lastMsg=-1, ckT=0, coT=0;
function playCutin(){
  const ci=document.getElementById('cutin'), tx=ci.querySelector('.ci-text'), bowl=document.getElementById('bowl');
  let i; do{i=Math.floor(Math.random()*MSGS.length);}while(i===lastMsg&&MSGS.length>1);
  lastMsg=i; tx.textContent=MSGS[i];
  ci.classList.remove('show','out'); void ci.offsetWidth; ci.classList.add('show');
  clearTimeout(ckT); clearTimeout(coT);
  // 着弾シェイク
  ckT=setTimeout(()=>{bowl.classList.remove('kick'); void bowl.offsetWidth; bowl.classList.add('kick');},150);
  // 着弾後にサッと消える
  coT=setTimeout(()=>ci.classList.add('out'),680);
}

let igniteT=0,resultT=0,cutinT=0;
function roll(){
  const bowl=document.getElementById('bowl');
  const res=document.getElementById('result');
  const ci=document.getElementById('cutin');
  res.classList.remove('show');
  ci.classList.remove('show','out'); bowl.classList.remove('kick');
  F.reset();
  clearTimeout(igniteT);clearTimeout(resultT);clearTimeout(cutinT);clearTimeout(ckT);clearTimeout(coT);
  // 落下アニメ再生
  bowl.classList.remove('play'); void bowl.offsetWidth; bowl.classList.add('play');
  // 振り始めで発火（くるくる回る間だけ燃える）
  igniteT=setTimeout(()=>F.ignite(950),120);
  // 落下の最中にカットインがドンッと飛び込む
  cutinT=setTimeout(playCutin,300);
  // 役確定
  resultT=setTimeout(()=>res.classList.add('show'),1250);
}
window.F=F; window.roll=roll; window.playCutin=playCutin;
// 初回自動再生
setTimeout(roll,300);
