<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>チンチロ カットインサンプル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#fff;font-family:sans-serif;padding:16px;max-width:460px;margin:0 auto}
h2{color:#f5c842;font-size:18px;margin-bottom:4px}
.intro{color:#999;font-size:12px;line-height:1.7;margin-bottom:16px}
.intro b{color:#ddd}
.card{background:#1b1b1b;border:1.5px solid #333;border-radius:16px;padding:14px;margin-bottom:18px}
.desc{font-size:11px;color:#888;margin-bottom:6px;line-height:1.6}

.stage{position:relative;width:220px;height:220px;margin:8px auto 2px;overflow:hidden;border-radius:50%}
.bowl{position:absolute;inset:0}
.bowl-bg{position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(ellipse at 38% 30%,
    #f8f8f6 0%,#eeece4 14%,#e0ddd5 28%,#cdc9c0 42%,
    #b5b0a7 56%,#9e9990 68%,#8a857c 79%,#76716a 88%,#636059 100%);
  box-shadow:inset 0 8px 22px rgba(0,0,0,.5),inset 0 -4px 10px rgba(255,255,255,.1),0 5px 28px rgba(0,0,0,.7);z-index:1}

/* サイコロ（品の字・静止） */
.die{position:absolute;width:46px;height:46px;border-radius:9px;
  background:linear-gradient(145deg,#fffdf7,#f0ece2);
  box-shadow:0 3px 7px rgba(0,0,0,.45),inset 0 1px 2px rgba(255,255,255,.7);
  z-index:3}
.die.top{left:87px;top:62px}
.die.bl {left:64px;top:118px}
.die.br {left:110px;top:118px}
.dot{position:absolute;width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#333,#000)}
.dot.r{background:radial-gradient(circle at 35% 30%,#ff3333,#cc0000)}

/* ── カットイン ── */
.cutin{position:absolute;inset:0;z-index:8;pointer-events:none;
  display:flex;align-items:center;justify-content:center;opacity:0}
.cutin.show{opacity:1}
.band{position:absolute;left:-20%;width:140%;height:54px;
  background:linear-gradient(90deg,rgba(255,60,0,0) 0%,#ff5a14 18%,#ff8a1e 50%,#ff5a14 82%,rgba(255,60,0,0) 100%);
  transform:skewY(-7deg) scaleX(0);transform-origin:left center;
  box-shadow:0 0 24px rgba(255,110,30,.8);}
.ci-text{position:relative;font-size:34px;font-weight:900;color:#fff;letter-spacing:.04em;
  text-shadow:0 0 6px rgba(255,150,40,.9),0 2px 4px rgba(0,0,0,.6);
  -webkit-text-stroke:1.5px #b32d00;transform:scale(0);white-space:nowrap}

.cutin.play .band{animation:bandIn .82s cubic-bezier(.2,.8,.2,1) both}
.cutin.play .ci-text{animation:textIn .82s cubic-bezier(.2,1.3,.3,1) both}
@keyframes bandIn{
  0%{transform:skewY(-7deg) scaleX(0);opacity:0}
  18%{opacity:1}
  30%{transform:skewY(-7deg) scaleX(1)}
  72%{transform:skewY(-7deg) scaleX(1);opacity:1}
  100%{transform:skewY(-7deg) scaleX(1) translateX(120%);opacity:0}
}
@keyframes textIn{
  0%{transform:scale(0) rotate(-4deg);opacity:0}
  22%{transform:scale(1.18) rotate(-2deg);opacity:1}
  34%{transform:scale(1) rotate(0)}
  72%{transform:scale(1) rotate(0);opacity:1}
  100%{transform:scale(1.05) translateX(40px);opacity:0}
}

.result{text-align:center;font-size:30px;font-weight:900;color:#f5c842;margin-top:6px;min-height:38px;letter-spacing:.06em;opacity:0;transition:opacity .3s}
.result.show{opacity:1}
.row{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.btn{background:#2a2a2a;color:#ccc;border:1px solid #444;border-radius:9px;padding:8px 18px;font-size:13px;cursor:pointer;font-weight:700}
.btn:hover{background:#383838;color:#fff}
.btn.main{background:#7a2d0a;border-color:#a8521f;color:#ffd9b8}
.btn.main:hover{background:#94380d}

.pool{margin-top:12px;background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;font-size:11.5px;color:#aaa;line-height:1.9}
.pool .h{color:#ddd;font-weight:700;display:block;margin-bottom:4px}
.pool .tag{display:inline-block;background:#2a2118;color:#f0b870;border:1px solid #4a3a26;border-radius:6px;padding:2px 8px;margin:2px 3px;font-weight:700}
</style>
</head>
<body>

<h2>💬 カットイン（短いメッセージ）サンプル</h2>
<p class="intro">サイコロを振る瞬間に、<b>短い期待感メッセージ</b>がパッと現れてサッと消える演出です。<br>テンポを崩さないよう<b>1秒以内</b>で出して消えます。メッセージは<b>毎回ランダム</b>。<br>「▶ カットイン」で確認できます。</p>

<div class="card">
  <div class="desc">サイコロが落ちる途中に、ランダムな短いメッセージがビュッと出る</div>
  <div class="stage">
    <div class="bowl">
      <div class="bowl-bg"></div>
      <div class="die top"><span class="dot" style="left:8px;top:8px"></span><span class="dot" style="left:30px;top:8px"></span><span class="dot" style="left:8px;top:30px"></span><span class="dot" style="left:30px;top:30px"></span></div>
      <div class="die bl"><span class="dot" style="left:8px;top:8px"></span><span class="dot" style="left:30px;top:8px"></span><span class="dot" style="left:19px;top:19px"></span><span class="dot" style="left:8px;top:30px"></span><span class="dot" style="left:30px;top:30px"></span></div>
      <div class="die br"><span class="dot" style="left:8px;top:7px"></span><span class="dot" style="left:8px;top:19px"></span><span class="dot" style="left:8px;top:31px"></span><span class="dot" style="left:30px;top:7px"></span><span class="dot" style="left:30px;top:19px"></span><span class="dot" style="left:30px;top:31px"></span></div>
      <div class="cutin" id="cutin"><div class="band"></div><div class="ci-text" id="ciText">アツい！</div></div>
    </div>
  </div>
  <div class="result" id="result">シゴロ</div>
  <div class="row">
    <button class="btn main" onclick="play()">▶ カットイン</button>
    <button class="btn" onclick="play()">🔁 別のメッセージ</button>
  </div>
  <div class="pool">
    <span class="h">メッセージ候補（この中からランダムで1つ）</span>
    <span class="tag">アツい！</span><span class="tag">ここで…！</span><span class="tag">来るか…？</span>
    <span class="tag">勝負！</span><span class="tag">震えろ…！</span><span class="tag">魅せろ！</span>
    <span class="tag">一発っ！</span><span class="tag">運命の一投</span><span class="tag">イチかバチか</span>
    <span class="tag">気合いだッ</span><span class="tag">いけ…！</span><span class="tag">魅せ場だ</span>
  </div>
</div>

<script>
const MSGS=["アツい！","ここで…！","来るか…？","勝負！","震えろ…！","魅せろ！",
            "一発っ！","運命の一投","イチかバチか","気合いだッ","いけ…！","魅せ場だ"];
let last=-1;
function play(){
  const ci=document.getElementById('cutin');
  const tx=document.getElementById('ciText');
  const res=document.getElementById('result');
  res.classList.remove('show');
  // 連続で同じにならないようランダム選択
  let i; do{ i=Math.floor(Math.random()*MSGS.length); }while(i===last&&MSGS.length>1);
  last=i; tx.textContent=MSGS[i];
  ci.classList.add('show');
  ci.classList.remove('play'); void ci.offsetWidth; ci.classList.add('play');
  setTimeout(()=>{ci.classList.remove('show');},900);
  setTimeout(()=>res.classList.add('show'),1050);
}
window.play=play;
setTimeout(play,400);
</script>
</body>
</html>
